name: Update eIndex Data

on:
  schedule:
    # 每天北京时间18:30运行 (UTC 10:30)
    - cron: '30 10 * * 1-5'
    # 每天北京时间21:00重试 (UTC 13:00)
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
  repository_dispatch:
    types: [refresh]

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare numpy mootdx requests

      - name: Update eIndex data (attempt 1)
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            python scripts/update_data.py --recent
          else
            python scripts/update_data.py
          fi

      - name: Check for missing data and retry
        run: |
          python -c "
          import json, sys
          with open('data/eindex_data.json') as f:
              data = json.load(f)
          warnings = data.get('warnings', [])
          turnover_missing = [w for w in warnings if '换手率' in w]
          if turnover_missing:
              print(f'仍有 {len(turnover_missing)} 天换手率缺失，等待30秒后重试...')
              sys.exit(1)
          print('数据完整，无需重试')
          " && echo "OK" || (sleep 30 && python scripts/update_data.py --recent)

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/eindex_data.json data/eindex_data.js data/limitup_cache.json data/limitdown_cache.json data/turn_rate_cache.json data/margin_cache.json data/cje_cache.json data/ltsz_cache.json
          git diff --staged --quiet || git commit -m "chore: update eindex data $(date +%Y-%m-%d)"
          git push
