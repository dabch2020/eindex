name: Update eIndex Data

on:
  schedule:
    # 每天北京时间18:30运行 (UTC 10:30)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare numpy mootdx

      - name: Update eIndex data
        run: python scripts/update_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/eindex_data.json data/limitup_cache.json
          git diff --staged --quiet || git commit -m "chore: update eindex data $(date +%Y-%m-%d)"
          git push
